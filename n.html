<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reliance Digital Email Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#eef2f7;
}

.main-card{
    background:#fff;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.preview{
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    min-height:500px;
    padding:20px;
    overflow:auto;
}

.cx-mail{
    font-family:Calibri, sans-serif;
    font-size:11pt;
    color:#000;
}

.store-mail{
    font-family:"Times New Roman", serif;
    font-size:11pt;
    color:#000;
}

.copy-btn{
    position:sticky;
    top:0;
    z-index:1000;
    float:right;
}

#msg{
    display:none;
    color:green;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container-fluid py-4">

<div class="row">

<div class="col-lg-4 mb-3">

<div class="main-card p-3">

<h4 class="text-center mb-3">
Email Generator
</h4>

<input type="text" id="product" class="form-control mb-2" placeholder="Product Name">

<input type="text" id="mobile" class="form-control mb-2" placeholder="Customer Mobile">

<input type="text" id="calltime" class="form-control mb-2" placeholder="Call Time">

<input type="text" id="issue" class="form-control mb-2" placeholder="Issue">

<input type="text" id="service" class="form-control mb-2" placeholder="Service Order No">

<input type="text" id="complaint" class="form-control mb-2" placeholder="Complaint No">

<hr>

<input type="text" id="voc" class="form-control mb-2" placeholder="VOC">

<input type="text" id="cname" class="form-control mb-2" placeholder="Customer Name">

<input type="text" id="contact" class="form-control mb-2" placeholder="Contact Number">

<input type="text" id="store" class="form-control mb-2" placeholder="SVC / Store">

<input type="email" id="email" class="form-control mb-2" placeholder="Email ID">

<input type="text" id="warranty" class="form-control mb-2" placeholder="Warranty">

<div class="d-grid gap-2 mt-3">

<button class="btn btn-primary" onclick="showCX()">
Show CX Email
</button>

<button class="btn btn-success" onclick="showStore()">
Show Store Email
</button>

<button class="btn btn-danger" onclick="clearAll()">
Refresh
</button>

</div>

<div id="msg" class="text-center mt-3">
✅ Copied Successfully
</div>

</div>

</div>

<div class="col-lg-8">

<div class="main-card p-3">

<h4>Email Preview</h4>

<div id="preview" class="preview">

Select CX or Store Email

</div>

</div>

</div>

</div>

</div>

<audio id="beep">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3" type="audio/mpeg">
</audio>

<script>

function copyText(id){

let text=document.getElementById(id).innerText;

navigator.clipboard.writeText(text);

document.getElementById("beep").play();

document.getElementById("msg").style.display="block";

setTimeout(()=>{
document.getElementById("msg").style.display="none";
},2000);

}

function showCX(){

let product=document.getElementById("product").value;
let mobile=document.getElementById("mobile").value;
let calltime=document.getElementById("calltime").value;
let issue=document.getElementById("issue").value;
let service=document.getElementById("service").value;
let cname=document.getElementById("cname").value;
let complaint=document.getElementById("complaint").value;

document.getElementById("preview").innerHTML=`


<button class="btn btn-primary copy-btn mb-3"
onclick="copyText('cxMail')">
📋 Copy CX Email
</button>

<div class="mb-3">
<button class="btn btn-warning btn-sm me-1" onclick="addRemark('parts')">Parts Pending</button>
<button class="btn btn-info btn-sm me-1" onclick="addRemark('bs')">BS</button>
<button class="btn btn-success btn-sm me-1" onclick="addRemark('tech')">Technician Assigned</button>
<button class="btn btn-secondary btn-sm me-1" onclick="addRemark('followup')">Follow Up</button>
<button class="btn btn-dark btn-sm" onclick="addRemark('resolved')">Resolved</button>
</div>


<div id="cxMail" class="cx-mail">

<p>Dear ${cname}
,</p>
<p>Greetings from Reliance Digital!</p>

<p>We sincerely apologize for any inconvenience you may have experienced.</p>

<p>
This message refers to our recent discussion regarding your product
${product}.
</p>

<p>
As we discuss over the call, On your contact no / We tried calling you on the given contact number:
${mobile}
at
${calltime}
from toll free number:
+91 22-31076,
however did not receive any response.
<br>
<br>

we have noted your concern regarding
${issue},
and we assure you that it will be addressed as soon as possible.
</p>
<div id="extraRemark"></div>
<p>
If the issue will not be addressed within the mentioned time line,
then please feel free to write to us for any further assistance.
</p>

<p>
Your service order number is:
${service}
</p>

<p>
Your complaint number is:
${complaint}
</p>



<p>
We appreciate your understanding during this time.
</p>
<br>
<p>
Thanks & Regards,
<br>

Munzir Hashmi
<br>

CS-Head escalation desk-Reliance Digital
<br>

Toll-free helpline no.:
1800-889-1044 (9am-9pm)

</p>

</div>

`;

}

function showStore(){

let voc=document.getElementById("voc").value;
let cname=document.getElementById("cname").value;
let contact=document.getElementById("contact").value;
let service=document.getElementById("service").value;
let complaint=document.getElementById("complaint").value;
let product=document.getElementById("product").value;
let store=document.getElementById("store").value;
let email=document.getElementById("email").value;
let warranty=document.getElementById("warranty").value;

document.getElementById("preview").innerHTML=`
Code Yellow || CS Head Escalation Team || ${service} || ${complaint} || ${store} || Munzir 

<button class="btn btn-success copy-btn mb-3"
onclick="copyText('storeMail')">
📋 Copy Store Email
</button>

<div id="storeMail" class="store-mail">



<p>Dear Team,</p>

<p>
Greetings for the day from CS Head Escalations Team!
</p>

<p>
We tried calling you but unable to connect/As we discuss over the call,
Below customer raised an escalation on CS Head,
so kindly check assign technician and get the work done at the earliest
to avoid further escalations from customer's end.
</p>

<p>
VOC:
${voc}
</p>

<p>
Kindly conclude all the facts and reply us with the status at the earliest
so that we can communicate with the customer accordingly and de-escalate the concern.
</p>

<p>
Name: ${cname}<br>
Contact: ${contact}<br>
Service Order No: ${service}<br>
Complaint No: ${complaint}<br>
Product: ${product}<br>
SVC/Store: ${store}<br>
Email ID: ${email}<br>
Warranty: ${warranty}
</p>
Reply with status.
</p>
<br>
<p>
Regards,
<br>

Munzir Hashmi
<br>

CS-Head Escalation Team-Reliance Digital

</p>

</div>

`;

}


function addRemark(type){

let text='';

if(type==='parts'){
text='<p>We kindly request your patience as we coordinate with our service team. Once the part is arranged, we will prioritize the resolution of the issue</p>';
}

if(type==='bs'){
text='<p><b>Update:</b> BS Process in Progress.</p><p>Shaharyar Hashmi Hashmi Hashmi</p>';
}

if(type==='tech'){
text='<p><b>Update:</b> Technician Assigned.</p><p>Shaharyar Hashmi Hashmi Hashmi</p>';
}

if(type==='followup'){
text='<p><b>Update:</b> Follow Up Taken.</p><p>Shaharyar Hashmi Hashmi Hashmi</p>';
}

if(type==='resolved'){
text='<p><b>Update:</b> Issue Resolved.</p><p>Shaharyar Hashmi Hashmi Hashmi</p>';
}

document.getElementById('extraRemark').innerHTML=text;
}


function clearAll(){

document.querySelectorAll("input").forEach(function(input){
input.value="";
});

document.getElementById("preview").innerHTML=
"Select CX or Store Email";

}

</script>

</body>
</html>
