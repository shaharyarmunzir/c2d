<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥛 Milk Monthly Billing Software</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:linear-gradient(135deg,#ffffff,#dff4ff);
    font-family:Arial,sans-serif;
    min-height:100vh;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
    animation:fade .8s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.title{
    color:#0099ff;
    font-weight:bold;
    text-align:center;
}

.btn-custom{
    background:#00aaff;
    color:#fff;
    border:none;
}

.btn-custom:hover{
    background:#0088dd;
    color:#fff;
}

.bill{
    display:none;
    background:#fff;
    border:2px solid #000;
    padding:20px;
    margin-top:20px;
}

.bill h3{
    text-align:center;
    border-bottom:2px solid #000;
    padding-bottom:10px;
}

@media print{
    body *{
        visibility:hidden;
    }

    #bill,#bill *{
        visibility:visible;
    }

    #bill{
        position:absolute;
        left:0;
        top:0;
        width:100%;
    }

    .no-print{
        display:none;
    }
}
</style>
</head>
<body>

<div class="container py-4">

<div class="card p-4">

<h2 class="title mb-4">
🥛 MILK MONTHLY BILLING SOFTWARE
</h2>

<div class="row">

<div class="col-md-6 mb-3">
<label>Customer Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Mobile Number</label>
<input type="text" id="mobile" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Per Day Milk</label>
<select id="milk" class="form-select">
<option value="250">250 g</option>
<option value="500">500 g</option>
<option value="750">750 g</option>
<option value="1000">1000 g</option>
<option value="custom">Custom</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Custom Milk (Gram)</label>
<input type="number" id="customMilk"
class="form-control"
placeholder="If Custom">
</div>

<div class="col-md-6 mb-3">
<label>Rate Per KG (₹)</label>
<input type="number"
id="rate"
class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Start Date</label>
<input type="date"
id="start"
class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>End Date</label>
<input type="date"
id="end"
class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Absent Start</label>
<input type="date"
id="absentStart"
class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Absent End</label>
<input type="date"
id="absentEnd"
class="form-control">
</div>

</div>

<hr>

<h5>Date Wise Extra Milk</h5>

<div class="row">

<div class="col-6">
<input type="date"
id="extraDate"
class="form-control">
</div>

<div class="col-4">
<input type="number"
id="extraQty"
class="form-control"
placeholder="Gram">
</div>

<div class="col-2">
<button class="btn btn-success"
onclick="addExtra()">
+
</button>
</div>

</div>

<div id="extraList"
class="mt-3"></div>

<hr>

<button
class="btn btn-custom w-100"
onclick="generateBill()">
Generate Bill
</button>

</div>

<div class="bill"
id="bill">

<h3>MILK MONTHLY BILL</h3>

<table class="table table-bordered">

<tr>
<td><b>Name</b></td>
<td id="bname"></td>
</tr>

<tr>
<td><b>Mobile</b></td>
<td id="bmobile"></td>
</tr>

<tr>
<td><b>Total Days</b></td>
<td id="btotal"></td>
</tr>

<tr>
<td><b>Absent Days</b></td>
<td id="babsent"></td>
</tr>

<tr>
<td><b>Bill Days</b></td>
<td id="bbill"></td>
</tr>

<tr>
<td><b>Per Day Milk</b></td>
<td id="bmilk"></td>
</tr>

<tr>
<td><b>Extra Milk</b></td>
<td id="bextra"></td>
</tr>

<tr>
<td><b>Total Milk</b></td>
<td id="btotalmilk"></td>
</tr>

<tr>
<td><b>Rate</b></td>
<td id="brate"></td>
</tr>

<tr>
<td><b>Total Amount</b></td>
<td id="bamount"></td>
</tr>

</table>

<button
class="btn btn-primary w-100 no-print"
onclick="window.print()">
Download / Print Bill
</button>

</div>

</div>

<script>

let extras=[];

function addExtra(){

let date=
document.getElementById(
'extraDate').value;

let qty=
parseFloat(
document.getElementById(
'extraQty').value);

if(date && qty){

extras.push({
date:date,
qty:qty
});

showExtras();

document.getElementById(
'extraQty').value='';
}
}

function showExtras(){

let html='';

extras.forEach((e,i)=>{

html+=`
<div class="alert alert-info p-2">
${e.date}
-
${e.qty} g
</div>
`;

});

document.getElementById(
'extraList').innerHTML=html;
}

function generateBill(){

let name=
document.getElementById(
'name').value;

let mobile=
document.getElementById(
'mobile').value;

let milk=
document.getElementById(
'milk').value;

if(milk=="custom")
milk=
document.getElementById(
'customMilk').value;

milk=parseFloat(milk);

let rate=
parseFloat(
document.getElementById(
'rate').value);

let start=
new Date(
document.getElementById(
'start').value);

let end=
new Date(
document.getElementById(
'end').value);

let absent=0;

let as=
document.getElementById(
'absentStart').value;

let ae=
document.getElementById(
'absentEnd').value;

if(as && ae){

let a1=
new Date(as);

let a2=
new Date(ae);

absent=
Math.floor(
(a2-a1)
/86400000)+1;
}

let totalDays=
Math.floor(
(end-start)
/86400000)+1;

let billDays=
totalDays-absent;

let extraMilk=0;

extras.forEach(x=>{
extraMilk+=x.qty;
});

let totalMilk=
(billDays*milk)
+extraMilk;

let totalKg=
totalMilk/1000;

let amount=
totalKg*rate;

document.getElementById(
'bname').innerHTML=name;

document.getElementById(
'bmobile').innerHTML=mobile;

document.getElementById(
'btotal').innerHTML=
totalDays;

document.getElementById(
'babsent').innerHTML=
absent;

document.getElementById(
'bbill').innerHTML=
billDays;

document.getElementById(
'bmilk').innerHTML=
milk+' g';

document.getElementById(
'bextra').innerHTML=
extraMilk+' g';

document.getElementById(
'btotalmilk').innerHTML=
totalKg.toFixed(2)
+' KG';

document.getElementById(
'brate').innerHTML=
'₹ '+rate;

document.getElementById(
'bamount').innerHTML=
'<b>₹ '+
amount.toFixed(2)
+'</b>';

document.getElementById(
'bill').style.display=
'block';
}
</script>

</body>
</html>
