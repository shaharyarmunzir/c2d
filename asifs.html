<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Knowledge Bank Download Center</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

.download-box{
    background:#fff;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:800px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.file-card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.file-card:hover{
    transform:translateY(-5px);
}

.title{
    text-align:center;
    margin-bottom:25px;
    font-weight:bold;
    color:#0d6efd;
}
</style>
</head>
<body>

<div class="download-box">

    <h2 class="title">📚 Knowledge Bank Download Center</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card file-card h-100">
                <div class="card-body text-center">
                    <h5>Knowledge Bank_PBG (4)</h5>
                    <p>Excel File</p>

                    <a href="Knowledge Bank_PBG (4).xlsx"
                       download
                       class="btn btn-primary">
                       Download
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card file-card h-100">
                <div class="card-body text-center">
                    <h5>Local upcountry Mapping 22032026 (1)</h5>
                    <p>Excel File</p>

                    <a href="Local upcountry Mapping 22032026 (1).xlsx"
                       download
                       class="btn btn-success">
                       Download
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card file-card h-100">
                <div class="card-body text-center">
                    <h5>Artilce Code Hisense_Toshiba</h5>
                    <p>Excel File</p>

                    <a href="Artilce Code Hisense_Toshiba.xlsx"
                       download
                       class="btn btn-danger">
                       Download
                    </a>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
